services:
  koharu:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cpu
    image: koharu:cpu
    container_name: koharu
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - data:/home/koharu/.local/share/Koharu
    environment:
      KOHARU_PORT: "4000"
      KOHARU_ARGS: ""
      XDG_RUNTIME_DIR: /tmp/runtime-koharu
    profiles:
      - cpu

  koharu-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-cuda
    image: koharu:cuda
    container_name: koharu-gpu
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - data:/home/koharu/.local/share/Koharu
    environment:
      KOHARU_PORT: "4000"
      KOHARU_ARGS: ""
      XDG_RUNTIME_DIR: /tmp/runtime-koharu
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  data: